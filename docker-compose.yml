services:
  postgres:
    image: postgres:16-alpine
    container_name: medhead-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medhead}
      POSTGRES_USER: ${POSTGRES_USER:-medhead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medhead}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medhead} -d ${POSTGRES_DB:-medhead}"]
      interval: 5s
      timeout: 5s
      retries: 10

  osrm:
    image: osrm/osrm-backend:latest
    container_name: medhead-osrm
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    # The .osrm file under osrm-data/ is produced by the local extract/partition/customize
    # recipe in the readme (see "Running OSRM locally"). Override the filename via
    # OSRM_GRAPH if you pre-processed a region other than great-britain.
    command: osrm-routed --algorithm mld /data/${OSRM_GRAPH:-great-britain-latest.osrm}

volumes:
  postgres-data:
