services:
  postgres:
    image: postgres:16-alpine
    container_name: medhead-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medhead}
      POSTGRES_USER: ${POSTGRES_USER:-medhead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medhead}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medhead} -d ${POSTGRES_DB:-medhead}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
