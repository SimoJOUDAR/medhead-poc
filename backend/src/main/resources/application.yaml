spring:
  application:
    name: medhead-poc
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medhead}
    username: ${SPRING_DATASOURCE_USERNAME:medhead}
    password: ${SPRING_DATASOURCE_PASSWORD:medhead}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: always
      platform: postgresql

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  security:
    jwt:
      # HS256 requires a secret of at least 256 bits (32 bytes).
      # Override via APP_SECURITY_JWT_SECRET in any non-dev environment.
      secret: ${APP_SECURITY_JWT_SECRET:dev-only-hs256-secret-do-not-use-outside-local-development-environments}
      ttl-minutes: ${APP_SECURITY_JWT_TTL_MINUTES:60}
    users:
      - username: demo
        # BCrypt hash of "demo"; overridable via APP_SECURITY_USERS_0_PASSWORD.
        password: "{bcrypt}$2a$10$FIE00mLeUHb3Xd00r/uZ6e/dq7qALrYTZWb1TCluY3uqgWW.8LLWC"
  osrm:
    host: ${APP_OSRM_HOST:localhost}
    port: ${APP_OSRM_PORT:5000}
    read-timeout-ms: ${APP_OSRM_READ_TIMEOUT_MS:2000}
