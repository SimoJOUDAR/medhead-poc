# MedHead Phase A baseline parameters.
# Referenced from baseline.jmx via ${__P(<key>, <default>)} and passed to
# JMeter through `jmeter -p baseline.properties`. Override any value on the
# command line with `-J<key>=<value>` to sweep a single knob without editing
# this file.
#
# Non-functional target: p95 < 200 ms per endpoint and 800 req/s aggregate
# throughput per backend instance. Two thread groups cover the target:
# a read-path steady-state pushed to the throughput ceiling, and a write-path
# burst at bounded concurrency. Keys below map 1:1 onto the profiles in
# baseline.jmx (see README.md in this folder).

# ----- Backend under test -----
protocol = http
host     = localhost
port     = 8080

# ----- Auth (pre-seeded dev user; see application.yaml / readme.md) -----
user     = demo
password = demo

# ----- Postgres (used by the setUp JDBC reseed) -----
dbUrl      = jdbc:postgresql://localhost:5432/medhead
dbUser     = medhead
dbPassword = medhead

# ----- Read-path steady-state profile -----
# Target 800 req/s aggregate (= 48000 req/min) over a 2-minute measurement
# window, cycling through the three read endpoints per thread loop.
readThreads          = 200
readRampUp           = 30
readDuration         = 120
readThroughputPerMin = 48000
hospitalId           = 1

# ----- Write-path burst profile -----
# 50 concurrent users x 200 iterations = 10,000 calls, ramped in 5 s.
# specialtyId 21 = Cardiology; coordinates sit on Fred Brooks Hospital
# (51.5230, -0.1300 in data.sql) so the main-scenario hot path is measured;
# once the seeded beds drain, subsequent calls exercise the fallback path,
# keeping the samples latency-meaningful even when they return 404.
writeThreads    = 50
writeIterations = 200
writeRampUp     = 5
writeSpecialtyId = 21
writeLatitude    = 51.523
writeLongitude   = -0.131
